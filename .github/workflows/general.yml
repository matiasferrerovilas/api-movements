name: CI Pipeline

on:
  push:
    branches: ["main", "develop"]

env:
  IMAGE_NAME: "mferrerovilas/api-movements"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Prepare Gradle
        run: chmod +x gradlew

      - name: Compute Version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          BUILD_VERSION=$(./gradlew -q printVersion | head -n1 | tr -d '\r\n')

          if [ -z "$BUILD_VERSION" ]; then
            echo "ERROR: Version is empty"
            exit 1
          fi

          if [[ "${GITHUB_REF_NAME}" == "develop" ]] || [[ "${GITHUB_REF_NAME}" == hotfix/* ]]; then
            PHASE="-SNAPSHOT"
          else
            PHASE=""
          fi

          FINAL_VERSION="${BUILD_VERSION}${PHASE}"

          # Escribir en $GITHUB_OUTPUT para usar en otros steps/jobs si hace falta
          printf "version=%s\n" "$FINAL_VERSION" >> "$GITHUB_OUTPUT"

          # Guardar en archivos para artifact
          echo "$FINAL_VERSION" > build.version
          echo "$PHASE" > build.phase

      - name: Build Spring Boot JAR
        run: ./gradlew clean bootJar --no-daemon --stacktrace

      - name: Run Tests
        run: ./gradlew test --no-daemon --stacktrace --info

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build.version
            build.phase
            build/libs/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Prepare runtime JAR
        run: |
          mv build/libs/*.jar api-movements.jar

      - name: Get Build Version
        id: version_getter
        run: |
          VERSION=$(cat build.version)
          PHASE=$(cat build.phase)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "phase=$PHASE" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker Image (Multi-Arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
